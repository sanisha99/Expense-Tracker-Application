<!DOCTYPE html>
<html>
<head>
    <title>Set Your Password</title>
    {% include "styles.html" %}
</head>
<body>

<div style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
    <div class="table-card" style="max-width:460px; width:100%;">

        <h2 class="dashboard-title" style="margin-bottom:6px;">Welcome, {{ username }}!</h2>
        <p style="color:#6c757d; margin-bottom:20px; font-size:14px;">
            Set your password to get started.
        </p>

        {% if error %}
            <div style="background:#ffe0e0; color:#c0392b; padding:10px;
                        border-radius:6px; margin-bottom:15px; font-size:14px;">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div style="margin-bottom:15px;">
                <label>New Password</label><br>
                <input type="password" name="password1" required
                       style="width:100%; padding:10px; border-radius:6px;
                              border:1px solid #ddd; margin-top:5px;">
            </div>

            <div style="margin-bottom:20px;">
                <label>Confirm Password</label><br>
                <input type="password" name="password2" required
                       style="width:100%; padding:10px; border-radius:6px;
                              border:1px solid #ddd; margin-top:5px;">
            </div>

            <button type="submit" class="action-btn" style="width:100%;">
                Set Password & Login
            </button>

        </form>
    </div>
</div>

</body>
</html>
