<!DOCTYPE html>
<html>

<head>
    <title>Add Expense</title>
    {% include "styles.html" %}
</head>

<body>

<div class="main-content">

    <h1 class="dashboard-title">Add Expense</h1>

    <div class="table-card" style="max-width:600px;">

        <form method="POST">
            {% csrf_token %}

            <!-- ITEM -->
            <div style="margin-bottom:15px;">
                <label>Item</label><br>
                <input type="text" name="item" required
                       style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
            </div>

            <!-- AMOUNT -->
            <div style="margin-bottom:15px;">
                <label>Amount</label><br>
                <input type="number" step="0.01" name="amount" required
                       style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
            </div>

            <!-- CATEGORY -->
            <div style="margin-bottom:15px;">
                <label>Category</label><br>
                <select name="category"
                        style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- DATE -->
            <div style="margin-bottom:15px;">
                <label>Date</label><br>
                <input type="date" name="date" required
                       style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
            </div>

            <!-- TAX RATE -->
            <div style="margin-bottom:20px;">
                <label>Tax Rate (%)</label><br>
                <input type="number" step="0.01" name="tax_rate"
                       style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
            </div>

            <!-- BUTTONS -->
            <div style="display:flex; gap:10px;">
                <button type="submit" class="action-btn">
                    Save Expense
                </button>

                <a href="/expenses/" class="action-btn" style="background:#6c757d;">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
