<!DOCTYPE html>
<html>
<head>
    <title>Email Sent</title>
    {% include "styles.html" %}
</head>
<body>

<div class="auth-wrapper">

        <div class="auth-header">

            <a href="{% url 'login' %}" class="action-btn">Back to Login</a>
        </div>

    </div>
</div>

</body>
</html>
